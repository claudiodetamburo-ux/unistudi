<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniStudi - Università Digitale</title>
    
    <style>
        /* --- GRAFICA ORIGINALE (PC) --- */
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 1200px; /* Larghezza fissa per PC */
            display: flex;
            gap: 20px;
        }

        /* Sidebar sinistra (Logo e Input) */
        .sidebar {
            width: 300px;
            flex-shrink: 0;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container img {
            max-width: 200px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #bfa100;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        /* Area Destra (Moduli) */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .module {
            background: #121212;
            border: 1px solid #d4af37;
            border-radius: 8px;
            padding: 20px;
            min-height: 150px;
            position: relative;
        }

        .module-title {
            color: #d4af37;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        .footer-row {
            display: flex;
            gap: 20px;
        }

        .footer-module {
            flex: 1;
            background: #121212;
            border: 1px solid #d4af37;
            border-radius: 8px;
            padding: 15px;
        }

        #output {
            line-height: 1.8;
            white-space: pre-wrap;
        }

        /* --- ADATTAMENTO CELLULARE (MODULI UNO SOTTO L'ALTRO) --- */
        @media (max-width: 800px) {
            body { padding: 10px; }
            
            .container {
                flex-direction: column; /* Incolonna Sidebar e Main Content */
                width: 100%;
            }

            .sidebar {
                width: 100%;
            }

            .footer-row {
                flex-direction: column; /* Incolonna Verifica e Note */
            }

            .module, .footer-module {
                width: 100%;
                box-sizing: border-box;
            }

            input, button {
                font-size: 16px; /* Evita lo zoom su iPhone */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="logo-container">
                <img src="logo.png" alt="UniStudi Logo">
            </div>
            
            <div class="input-group">
                <label>Materia (es. Biochimica)</label>
                <input type="text" id="materia">
            </div>
            <div class="input-group">
                <label>Facoltà (es. Medicina)</label>
                <input type="text" id="facolta">
            </div>
            <div class="input-group">
                <label>Università (es. Vanvitelli)</label>
                <input type="text" id="univ">
            </div>
            
            <button onclick="generaCapitoli()">Reperisci Programma Ufficiale</button>
        </div>

        <div class="main-content">
            <div class="module">
                <div class="module-title">Trattato Tecnico-Scientifico</div>
                <div id="output">L'IA genererà un programma basato sui requisiti ministeriali della facoltà indicata.</div>
            </div>

            <div class="footer-row">
                <div class="footer-module">
                    <div class="module-title">Verifica Apprendimento</div>
                    <div style="color:#555; font-size:13px;">Sezione Quiz...</div>
                </div>
                <div class="footer-module">
                    <div class="module-title">Note e Integrazioni</div>
                    <textarea style="width:100%; background:transparent; border:none; color:#eee; outline:none;" rows="5" placeholder="Scrivi qui..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Chiave API spezzata
        const p1 = "gsk_gS9vUlpxcalriicTpujzWGdyb3FY4NWwe";
        const p2 = "MT0HE4WZJbraSShORd3";

        async function generaCapitoli() {
            const m = document.getElementById('materia').value;
            const f = document.getElementById('facolta').value;
            const u = document.getElementById('univ').value;
            const out = document.getElementById('output');

            if(!m || !f) { alert("Compila i campi!"); return; }

            out.innerHTML = "Generazione in corso...";
            const k = p1 + p2;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${k}` },
                    body: JSON.stringify({
                        model: "llama3-70b-8192",
                        messages: [{ role: "user", content: `Sei un professore di ${f} alla ${u}. Genera una spiegazione lunghissima, tecnica e divisa in capitoli per la materia: ${m}.` }]
                    })
                });
                const data = await response.json();
                out.innerHTML = data.choices[0].message.content;
            } catch(e) {
                out.innerHTML = "Errore di connessione.";
            }
        }
    </script>
</body>
</html>
